on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.2'
          architecture: x64

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Build Flutter iOS (无签名,仅编译)
        run: flutter build ios --release --no-codesign --verbose
        working-directory: .

      - name: Install CocoaPods dependencies
        run: |
          cd ios
          pod install --repo-update

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Install fastlane
        run: |
          cd ios
          gem install fastlane -N

      - name: 导入 MobileProvision 描述文件
        env:
          MOBILE_PROVISION_BASE64: ${{ secrets.MOBILE_PROVISION_BASE64 }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$MOBILE_PROVISION_BASE64" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/esports.mobileprovision
          security cms -D -i ~/Library/MobileDevice/Provisioning\ Profiles/esports.mobileprovision

      - name: Create Appfile
        run: |
          mkdir -p ios/fastlane
          cat > ios/fastlane/Appfile << EOF
          app_identifier("com.elixir.esports")
          team_id("5U9XJBS26D")
          itc_team_id("120847696")
          EOF

      - name: Create Fastfile
        run: |
          mkdir -p ios/fastlane
          
          cat > ios/fastlane/Fastfile << 'EOF'
          default_platform(:ios)

          platform :ios do
            lane :build_and_upload do
              app_store_connect_api_key(
                key_id: ENV["KEY_ID"],
                issuer_id: ENV["ISSUER_ID"],
                in_house: false
              )
              
              cert_dir = ENV["RUNNER_TEMP"]
              p12_path = "#{cert_dir}/certificate.p12"
              p12_content = Base64.decode64(ENV["P12_FILE"])
              File.open(p12_path, "wb") { |f| f.write(p12_content) }
              
              keychain_name = "ios_build_keychain"
              keychain_password = "temp_123456"
              sh("security create-keychain -p #{keychain_password} #{keychain_name}")
              sh("security default-keychain -s #{keychain_name}")
              sh("security unlock-keychain -p #{keychain_password} #{keychain_name}")
              sh("security set-keychain-settings -t 3600 -u #{keychain_name}")
              sh("security set-key-partition-list -S apple-tool:,apple: -s -k #{keychain_password} #{keychain_name}")
              
              import_certificate(
                certificate_path: p12_path,
                certificate_password: ENV["P12_PASSWORD"],
                keychain_name: keychain_name,
                keychain_password: keychain_password
              )
              
              gym(
                workspace: "Runner.xcworkspace",
                scheme: "Runner",
                configuration: "Release",
                export_method: "app-store",
                codesigning_identity: "iPhone Distribution",
                export_team_id: "5U9XJBS26D",
                output_directory: "./build",
                output_name: "Runner.ipa",
                skip_profile_detection: true,
                xcargs: "PROVISIONING_PROFILE_SPECIFIER='esports' CODE_SIGN_STYLE=Manual"
              )
              
              pilot(
                ipa: "./build/Runner.ipa",
                app_identifier: "com.elixir.esports",
                skip_waiting_for_build_processing: true,
                distribute_external: false,
                notify_testers: false
              )
              
              sh("rm -f #{p12_path}")
              sh("security delete-keychain #{keychain_name}")
            end
          end
          EOF

      - name: Build and upload to TestFlight
        run: |
          cd ios
          fastlane build_and_upload
        env:
          KEY_ID: ${{ secrets.KEY_ID }}
          ISSUER_ID: ${{ secrets.ISSUER_ID }}
          APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
          P12_FILE: ${{ secrets.P12_FILE }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          MOBILE_PROVISION_BASE64: ${{ secrets.MOBILE_PROVISION_BASE64 }}
