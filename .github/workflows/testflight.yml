name: iOS TestFlight

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.2'
          architecture: x64

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Install CocoaPods dependencies
        run: |
          cd ios
          pod install

      - name: Import API Key
        run: |
          echo "${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}" > /tmp/api_key.p8
          mkdir -p ~/.appstoreconnectkit
          cp /tmp/api_key.p8 ~/.appstoreconnectkit/

      - name: Build iOS app (simulator only for testing)
        run: |
          flutter build ios --simulator --no-codesign

      - name: Verify build
        run: ls -la build/ios/iphonesimulator/
