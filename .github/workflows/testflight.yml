name: iOS TestFlight

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.2'
          architecture: x64

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Install CocoaPods dependencies
        run: |
          cd ios
          pod install

      - name: Create Appfile for fastlane
        run: |
          mkdir -p ios/fastlane
          cat > ios/fastlane/Appfile << EOF
          app_identifier("com.elixir.esports")
          team_id("5U9XJBS26D")
          apple_id("${{ secrets.APPLE_ID }}")
          EOF

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'

      - name: Install fastlane
        run: gem install fastlane

      - name: Build and upload to TestFlight
        run: |
          cd ios
          fastlane pilot upload \
            --api_key_key_id "${{ secrets.KEY_ID }}" \
            --api_key_issuer_id "${{ secrets.ISSUER_ID }}" \
            --api_key "${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}" \
            --app_identifier "com.elixir.esports" \
            --skip_waiting_for_build_processing \
            --distribute_external false
        env:
          FASTLANE_APPLE_APPLICATION_SPECIFIC_PASSWORD: ${{ secrets.APP_SPECIFIC_PASSWORD }}
