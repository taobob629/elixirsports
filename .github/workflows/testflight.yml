name: iOS TestFlight

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.2'
          architecture: x64

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Install CocoaPods dependencies
        run: |
          cd ios
          pod install

      # ===== 使用 fastlane 自动代码签名 =====
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.0'

      - name: Install fastlane
        run: gem install fastlane

      - name: Create Appfile for fastlane
        run: |
          cat > ios/fastlane/Appfile << 'EOF'
          apple_id("${{ secrets.APPLE_ID }}")
          app_identifier("com.elixir.esports")
          team_id("${{ secrets.TEAM_ID }}")
          EOF

      - name: Create Fastfile for fastlane
        run: |
          cat > ios/fastlane/Fastfile << 'EOF'
          default_platform(:ios)

          platform :ios do
            desc "Build and upload to TestFlight"
            lane :testflight do
              # 获取最新的 TestFlight build 号
              latest_build_number = app_store_connect_build_number(
                platform: "ios",
                api_key: {
                  "key_id" => "${{ secrets.KEY_ID }}",
                  "issuer_id" => "${{ secrets.ISSUER_ID }}",
                  "key" => "${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}"
                }
              )
              
              # 自动递增 build 号
              new_build_number = latest_build_number.to_i + 1
              
              # 构建
              build_app(
                workspace: "ios/Runner.xcworkspace",
                scheme: "Runner",
                export_options: {
                  method: "app-store",
                  signingStyle: "automatic"
                },
                build_number: new_build_number.to_s
              )

              # 上传到 TestFlight
              upload_to_testflight(
                api_key: {
                  "key_id" => "${{ secrets.KEY_ID }}",
                  "issuer_id" => "${{ secrets.ISSUER_ID }}",
                  "key" => "${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}"
                },
                beta_groups: ["Internal Testers"]
              )
            end
          end
          EOF

      - name: Build and upload to TestFlight
        run: |
          cd ios
          fastlane testflight
        env:
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
