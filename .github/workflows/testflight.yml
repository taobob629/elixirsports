name: TestFlight

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select Xcode 15.4
        run: |
          sudo xcode-select -s /Applications/Xcode_15.4.app
          xcodebuild -version

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'
          channel: 'stable'

      - name: Cache Flutter pods
        uses: actions/cache@v3
        with:
          path: ios/Pods
          key: ${{ runner.os }}-pod-${{ hashFiles('**/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pod-

      - name: Install dependencies
        run: |
          cd ios
          flutter pub get
          pod install

      - name: Create keychain
        run: |
          keychain_path=~/Library/Keychains/ios_build_keychain-db
          security create-keychain -p temp_123456 $keychain_path
          security unlock-keychain -p temp_123456 $keychain_path
          security set-keychain-settings -lut 7200 $keychain_path

      - name: Import certificate
        env:
          P12_FILE: ${{ secrets.P12_FILE }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
        run: |
          cert_dir="$HOME/certs"
          mkdir -p $cert_dir
          p12_path="$cert_dir/certificate.p12"
          echo "$P12_FILE" | base64 --decode > $p12_path
          
          security import $p12_path -P $P12_PASSWORD -A -t cert -f pkcs12 -k ~/Library/Keychains/ios_build_keychain-db
          security set-key-partition-list -S apple-tool:,apple: -k temp_123456 -D "" -l "Apple Distribution: ELIXIR ESPORTS PTE. LTD. (5U9XJBS26D)" ~/Library/Keychains/ios_build_keychain-db

      - name: Import provisioning profile
        env:
          MOBILE_PROVISION_BASE64: ${{ secrets.MOBILE_PROVISION_BASE64 }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$MOBILE_PROVISION_BASE64" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/esports.mobileprovision

      - name: Build iOS with Fastlane
        run: |
          cd ios
          bundle exec fastlane build_and_upload

      - name: Upload build artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-logs
          path: |
            ~/Library/Logs/gym/*.log
            build/ios/ipa/*.ipa
          retention-days: 5

      - name: Clean up keychain
        if: always()
        run: |
          security delete-keychain ~/Library/Keychains/ios_build_keychain-db
