name: iOS TestFlight

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.2'
          architecture: x64

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Install CocoaPods dependencies
        run: |
          cd ios
          pod install

      - name: Create Export Options Plist
        run: |
          cat > /tmp/ExportOptions.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>5U9XJBS26D</string>
            <key>signingStyle</key>
            <string>automatic</string>
            <key>export</key>
            <true/>
          </dict>
          </plist>
          EOF

      - name: Build iOS app
        run: |
          flutter build ipa \
            --release \
            --export-options-plist=/tmp/ExportOptions.plist \
            --team-id=5U9XJBS26D
        env:
          KEY_ID: ${{ secrets.KEY_ID }}
          ISSUER_ID: ${{ secrets.ISSUER_ID }}
          APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'

      - name: Install fastlane
        run: gem install fastlane

      - name: Create Fastfile for upload
        run: |
          mkdir -p ios/fastlane
          cat > ios/fastlane/Fastfile << 'EOF'
          default_platform(:ios)

          platform :ios do
            lane :upload do
              ipa_path = Dir.glob("../build/ios/ipa/*.ipa").last
              upload_to_testflight(
                ipa: ipa_path,
                api_key: {
                  "key_id" => ENV["KEY_ID"],
                  "issuer_id" => ENV["ISSUER_ID"],
                  "key" => ENV["APP_STORE_CONNECT_PRIVATE_KEY"]
                }
              )
            end
          end
          EOF

      - name: Upload to TestFlight
        run: |
          cd ios
          fastlane upload
        env:
          KEY_ID: ${{ secrets.KEY_ID }}
          ISSUER_ID: ${{ secrets.ISSUER_ID }}
          APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
