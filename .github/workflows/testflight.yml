name: iOS TestFlight

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.2'
          architecture: x64

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Install CocoaPods dependencies
        run: |
          cd ios
          pod install

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'

      - name: Install fastlane
        run: gem install fastlane

      - name: Create Appfile
        run: |
          mkdir -p ios/fastlane
          cat > ios/fastlane/Appfile << EOF
          app_identifier("com.elixir.esports")
          team_id("5U9XJBS26D")
          apple_id("${{ secrets.APPLE_ID }}")
          EOF

      - name: Create Fastfile
        run: |
          mkdir -p ios/fastlane
          cat > ios/fastlane/Fastfile << 'EOF'
          default_platform(:ios)

          platform :ios do
            lane :build do
              # Build IPA with automatic signing using xcargs
              build_app(
                workspace: "Runner.xcworkspace",
                scheme: "Runner",
                configuration: "Release",
                export_options: {
                  method: "app-store",
                  teamID: "5U9XJBS26D",
                  signingStyle: "automatic"
                },
                xcargs: "allowProvisioningUpdates=1"
              )
            end

            lane :upload_testflight do
              pilot(
                app_identifier: "com.elixir.esports",
                skip_waiting_for_build_processing: true,
                distribute_external: false,
                api_key: {
                  "key_id" => ENV["KEY_ID"],
                  "issuer_id" => ENV["ISSUER_ID"],
                  "key" => ENV["APP_STORE_CONNECT_PRIVATE_KEY"]
                }
              )
            end
          end
          EOF

      - name: Build and upload to TestFlight
        run: |
          cd ios
          fastlane build
          fastlane upload_testflight
        env:
          KEY_ID: ${{ secrets.KEY_ID }}
          ISSUER_ID: ${{ secrets.ISSUER_ID }}
          APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
