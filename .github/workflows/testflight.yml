name: iOS TestFlight

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.2'
          architecture: x64

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Install CocoaPods dependencies
        run: |
          cd ios
          pod install

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'

      - name: Install fastlane
        run: gem install fastlane

      - name: Create Appfile
        run: |
          mkdir -p ios/fastlane
          cat > ios/fastlane/Appfile << EOF
          app_identifier("com.elixir.esports")
          team_id("5U9XJBS26D")
          itc_team_id("120847696")
          EOF

      - name: Create Fastfile with p12 certificate
        run: |
          mkdir -p ios/fastlane
          mkdir -p ~/Library/MobileDevice/Certificates
          
          # Decode p12 certificate
          echo "$P12_FILE" | base64 --decode > ~/Library/MobileDevice/Certificates/distribution.p12
          
          cat > ios/fastlane/Fastfile << 'EOF'
          default_platform(:ios)

          platform :ios do
            lane :build do
              # Use App Store Connect API for authentication
              app_store_connect_api_key(
                key_id: ENV["KEY_ID"],
                issuer_id: ENV["ISSUER_ID"],
                key_content: ENV["APP_STORE_CONNECT_PRIVATE_KEY"]
              )
              
              # Build with manual signing using p12 certificate
              gym(
                workspace: "Runner.xcworkspace",
                scheme: "Runner",
                configuration: "Release",
                export_method: "app-store",
                codesigning_identity: "Apple Distribution: ELIXIR ESPORTS PTE. LTD. (5U9XJBS26D)",
                xcargs: "CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO"
              )
            end

            lane :upload_testflight do
              pilot(
                app_identifier: "com.elixir.esports",
                skip_waiting_for_build_processing: true,
                distribute_external: false,
                api_key: {
                  "key_id" => ENV["KEY_ID"],
                  "issuer_id" => ENV["ISSUER_ID"],
                  "key" => ENV["APP_STORE_CONNECT_PRIVATE_KEY"]
                }
              )
            end
          end
          EOF

      - name: Build and upload to TestFlight
        run: |
          cd ios
          # Import p12 certificate to keychain
          security unlock-keychain -p "$P12_PASSWORD" ~/Library/Keychains/login.keychain-db
          security import ~/Library/MobileDevice/Certificates/distribution.p12 -P "$P12_PASSWORD" -A -t cert -k ~/Library/Keychains/login.keychain-db
          
          fastlane build
          fastlane upload_testflight
        env:
          KEY_ID: ${{ secrets.KEY_ID }}
          ISSUER_ID: ${{ secrets.ISSUER_ID }}
          APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
          P12_FILE: ${{ secrets.P12_FILE }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
